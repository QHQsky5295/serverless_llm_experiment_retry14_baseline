      gpu_memory_utilization: 0.80  # vLLM 允许占用的单卡显存比例上限
      max_model_len: 1024  # 模型允许处理的最大上下文长度
      max_loras: 1  # Nemo + TP=2 在当前 vLLM 路径下先保守限制为 1，避免多 LoRA 同批触发内核异常
      max_lora_rank: 16  # 支持的 LoRA 最大 rank
      enable_lora: true  # 是否开启 LoRA 支持
      enforce_eager: true  # 是否强制 eager 模式，避免部分 CUDA Graph 兼容问题
      dtype: "float16"  # 模型权重与推理使用的数据类型
      max_num_seqs: 1  # Nemo + TP=2 主线先串行化 runtime 内部调度，绕开已观测到的 V1 LoRA 并发不稳定
      max_num_batched_tokens: 1024  # 单批次允许处理的最大 token 总数
      max_output_tokens_cap: 64  # 单次生成的最大输出 token 上限
      max_input_len: 256  # 单请求输入最大长度，超出会截断
      runtime_concurrency_cap: 1  # 主线先限制单 runtime 并发为 1，把请求排队到系统层而不是交给易崩的内核组合
      tokenizer_mode: "mistral"  # Mistral/Nemo tokenizer 走官方专用模式，修正 auto 模式下的 regex 警告
      enable_chunked_prefill: false  # Nemo 当前禁用 chunked prefill，避免 TP=2 + LoRA + V1 路径不稳定
      enable_prefix_caching: false  # Nemo 当前禁用 prefix caching，避免与保守路径叠加触发运行时异常
      vllm_use_v1: false  # 强制退回 vLLM V0 LoRA 路径，绕开当前环境下 Nemo 的 V1 EngineCore 崩溃
      vllm_attention_backend: "FLASH_ATTN"  # 强制使用 FlashAttention 后端，避免 V1/FlashInfer 组合的不确定性
      vllm_use_flashinfer_sampler: false  # 关闭 FlashInfer sampler，减少 Nemo 当前路径上的额外内核差异
    hardware:  # 硬件容量与显存估计配置块
      model_weights_mb: 24576  # 基座模型权重占用的显存估计值（MB）
      kv_per_1k_tokens_mb: 4.0  # 每 1000 token 的 KV cache 显存估计（MB）
    storage:  # 工件冻结目录配置；Mistral 12B/13B 档的正式对比实验固定复用这一批工件
      remote_dir: "artifacts/frozen/mistral_nemo_12b_a500_v1"  # Mistral Nemo 12B/13B 论文正式对比的冻结 LoRA 源仓库

