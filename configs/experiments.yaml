# ---------------------------------------------------------------------------
# 硬件配置（用于 SOTA baseline 延迟模型校准）
# ---------------------------------------------------------------------------
hardware:  # 硬件容量与显存估计配置块
  # 兼容回退层：active mainline 的硬件估计值通常由所选 model profile 覆盖。
  gpu_budget_mb: 24576              # 单卡 3090 24 GB
  model_weights_mb: 3200            # 回退默认估计值

  # KV cache 每 1K tokens 占用（MB）：回退默认估计值
  kv_per_1k_tokens_mb: 1.0  # 每 1000 token 的 KV cache 显存估计（MB）

  # S-LoRA baseline：CPU pinned memory → GPU (PCIe 4.0 x16)
  pcie_bw_mbps: 16000  # CPU 内存到 GPU 的 PCIe 带宽估计（MB/s）

  # ServerlessLLM baseline：NVMe SSD → GPU
  nvme_bw_mbps: 3000  # NVMe 到 GPU 的带宽估计（MB/s）

  # GPU 显存分配与同步开销（ms）
  gpu_load_overhead_ms: 50  # GPU 分配/同步的固定开销（ms）
  serverlessllm_overhead_ratio: 0.6  # ServerlessLLM 路径中沿用的固定开销比例；显式冻结，避免藏在代码里

# ---------------------------------------------------------------------------
# 资源协同调度配置（贡献3）
# ---------------------------------------------------------------------------
resource_coordination:  # 扩缩容与资源协同调度配置块
  min_instances: 1                  # 实例池下限（scale-down 至少保留）
  max_instances: 4                  # 兼容回退层最多允许扩到的物理 runtime 数
  instance_mode: "auto"             # 兼容回退层默认实例模式；真实主线请以 active workload profile 为准
  instance_model_overrides: {}      # dedicated/auto 模式下新实例的 model_cfg 覆盖
  effective_capacity_admission_enabled: true  # 当前仓库默认主线：开启 P2.5 风格有效容量准入
  lora_load_reserve_ratio: 0.15     # 预留显存比例用于加载队列
  max_concurrent_loads: 2           # 渐进式启动：最多2个并发 LoRA 加载
  idle_timeout_s: 10                # 低负载持续 N 秒后触发 scale-down
  warm_pool_size: 2                 # 默认 warm pool 保留数量；在 24G 显存机器上取 2 更稳
  # A1: 请求流内扩缩决策
  scale_up_threshold_rps: 3.0       # 固定模式下的 RPS 阈值；动态模式下忽略
  scale_cooldown_s: 5.0            # continuous_queue_v2 主线下与 arrival_window / TTFT_SLO 对齐的 scale-up 最小间隔
  scale_decision_interval: 25      # 每处理 N 个请求评估一次是否扩容
  scale_eval_interval_s: 5.0       # v2 continuous queue 下 live scale control 周期；与在线观测窗口同阶
  routing_policy: "adapter_affinity"  # 请求路由策略
  arrival_window_s: 5.0            # 估计 arrival RPS 的滑动窗口（秒）
  # online_hotness_window_s 缺省时复用 max(arrival_window_s, scale_eval_interval_s, TTFT_SLO)

  # 动态扩缩容阈值（论文：workload-adaptive）
  dynamic_scaling: true             # 默认开启：用 EWMA 基线 + 相对阈值替代固定 RPS 阈值
  baseline_rps_ewma_beta: 0.25      # EWMA 更新系数 β
  scale_up_alpha: 0.3               # scale-up 触发线 = max(T_min, baseline_rps * (1 + α))
  scale_up_t_min: 1.0               # scale-up 绝对下限 (RPS)
  scale_down_beta: 0.4              # scale-down 触发线 = baseline_rps * β_down
  scale_down_duration_s: 45         # 持续低负载 ≥ 此秒数才执行 scale-down
  dynamic_warm_pool: true           # warm pool 大小随近期活跃 LoRA 数自适应
  warm_pool_gamma: 0.2              # warm_pool_size = clip(round(active_loras_ewma*(1+γ)), min, max)
  warm_pool_min: 2  # 动态 warm pool 的最小值
  warm_pool_max: 8  # 动态 warm pool 的最大值
  host_locality_factor: 1.0         # HOST→GPU utility 权重；显式配置，避免代码内隐式常数
  cpu_locality_factor: 0.9          # CPU→GPU utility 权重
  nvme_locality_factor: 0.75        # NVMe→GPU utility 权重
  remote_locality_factor: 0.5       # Remote→GPU utility 权重

# ---------------------------------------------------------------------------
# LoRA 适配器
# ---------------------------------------------------------------------------
lora_adapters:  # LoRA 工件生成、数量与 manifest 配置块
  generation_mode: "peft_finetune"  # 论文主线默认：PEFT + 轻量 finetune；synthetic 仅保留给 quick/debug
  preparation_mode: "two_phase"  # bootstrap_once=空目录时自动生成一次、之后严格冻结复用；one_shot=自动补齐；two_phase=必须先手动生成
  artifact_pool_profile: "standardized_v1"  # 当前运行中的工件池版本：standardized_v1=标准化控变量；正式 V2 将采用离线建库的 publicmix 方案
  artifact_pool_seed: 42  # 异构工件池分配种子；同一 base model 下不同系统对比时必须保持一致
  generate_synthetic: false  # 是否允许用 synthetic 工件兜底
  manifest_path: "configs/generated/lora_manifest_1000.json"  # adapter manifest 文件路径
  auto_create_manifest: true  # manifest 不存在时是否自动创建
  preserve_legacy_names: true  # 是否保留早期 adapter 命名方式
  apply_scale_preset: true          # 是否按 adapter 数量自动套用 scale_presets；14B 等新模型可关闭
  selected_num_adapters: 500  # 当前 profile 默认选中的 adapter 数量
  quick_num_adapters: 100  # quick 模式下使用的 adapter 数量
  full_num_adapters: 500  # 正式完整版使用的 adapter 数量
  # 说明：
  #   1) 运行主实验时，将从 manifest 中选择前 N 个 adapter
  #   2) quick 模式默认 100；完整版默认 500
  #   3) 若 manifest 不存在，run_all_experiments.py 会自动生成元数据文件
  #   4) 真正的 adapter 目录可通过 scripts/generate_lora_adapters.py 批量生成
  #   5) 当前论文主线默认要求 PEFT+finetune 工件；bootstrap_once 会在空目录时自动生成一次并冻结
  #   6) 若想严格拆成两阶段，设置 preparation_mode=two_phase，runner 会要求先手动生成
  artifact_pool_profiles:  # 生成式 LoRA 工件池模板；V1 当前在用，realistic_v2 仅保留给内部异构生成实验，不等同于正式 publicmix V2
