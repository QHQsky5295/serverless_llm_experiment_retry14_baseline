cost_model:  # 成本估算模型参数
  base_cost_usd: 0.001  # 每次请求或实验的基础固定成本
  input_token_cost_usd: 0.0000015  # 每个输入 token 的成本
  output_token_cost_usd: 0.000002  # 每个输出 token 的成本
  gpu_hour_cost_usd: 3.0  # GPU 每小时的成本估计

# =============================================================================
# 实验场景（消融 + SOTA 对比）
# =============================================================================
scenarios:  # 本次要运行的实验场景列表

  # ── Baseline 1: Cold Start（最坏情况，现有 Serverless 平台默认行为）────────
  - name: "cold_start"  # 场景名称；会写入日志与结果文件
    baseline_type: "cold_start"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      Baseline: 每次请求均从远端下载 LoRA，无任何缓存。
      对标现有无状态 Serverless 函数实例的行为。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: false  # 是否启用当前功能块

  # ── Baseline 2: S-LoRA (SOSP'23) ─────────────────────────────────────
  - name: "slora_style"  # 场景名称；会写入日志与结果文件
    baseline_type: "slora_style"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      S-LoRA: LoRA 适配器驻留在 CPU pinned memory，按需通过 PCIe 加载到 GPU。
      LRU GPU 驱逐，无预加载。对标 S-LoRA (SOSP'23)。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: false  # 是否启用当前功能块
      lru_cache_size: 8  # LRU 缓存大小

  # ── Baseline 3: ServerlessLLM (NSDI'24) ──────────────────────────────
  - name: "serverlessllm"  # 场景名称；会写入日志与结果文件
    baseline_type: "serverlessllm"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      ServerlessLLM: NVMe 检查点存储，本地性感知路由，无预测性预加载。
      对标 ServerlessLLM (NSDI'24)。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: false  # 是否启用当前功能块
      lru_cache_size: 8  # LRU 缓存大小

  # ── FaaSLoRA 贡献1：三层级联预加载（远端→硬盘→内存→GPU）────────────────
  - name: "faaslora_nvme"  # 场景名称；会写入日志与结果文件
    baseline_type: "faaslora_nvme"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      FaaSLoRA 贡献1：最热→GPU、次热→内存、再次→硬盘；请求时从对应层加载，避免远程直连 GPU。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: true  # 是否启用当前功能块
      min_hotness: 0.4  # 进入预加载集合的最小热度阈值
      gpu_warmup_hotness: 0.6  # 允许提前预热到 GPU 的热度阈值
      nvme_capacity_mb: 20480  # NVMe 层可用于 LoRA 的容量上限（MB）
      host_capacity_mb: 4096  # 主机内存层可用于 LoRA 的容量上限（MB）
      scale_up_preload_mb: 1024  # scale-up 预加载预算显式固定，避免落回 25%+clamp 启发式
      strategy: "greedy"  # 预加载选择策略

  # ── FaaSLoRA 贡献1+2（消融：无贡献3）───────────────────────────────
  - name: "faaslora_no_coord"  # 场景名称；会写入日志与结果文件
    baseline_type: "faaslora_no_coord"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      FaaSLoRA 贡献1+2（消融实验）：命中感知预加载 + GPU 多层显存驻留，
      但无贡献3的扩缩容协同调度。用于量化贡献3的独立价值。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: true  # 是否启用当前功能块
      min_hotness: 0.3  # 进入预加载集合的最小热度阈值
      gpu_warmup_hotness: 0.6  # 允许提前预热到 GPU 的热度阈值
      nvme_capacity_mb: 20480  # NVMe 层可用于 LoRA 的容量上限（MB）
      host_capacity_mb: 4096  # 主机内存层可用于 LoRA 的容量上限（MB）
      scale_up_preload_mb: 1024  # scale-up 预加载预算显式固定，避免落回 25%+clamp 启发式
      strategy: "greedy"  # 预加载选择策略
    resource_coordination:  # 扩缩容与资源协同调度配置块
      coordination_enabled: false  # 是否启用贡献 3 的资源协同机制

  # ── FaaSLoRA 完整系统（贡献1+2+3）──────────────────────────────────
  - name: "faaslora_full"  # 场景名称；会写入日志与结果文件
    baseline_type: "faaslora_full"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      FaaSLoRA 完整系统：
        贡献1 — 命中感知工件预加载（scale-up 前提前加载高频 LoRA）
        贡献2 — GPU 显存三层本地驻留（热层 GPU 显存 / 温层 HOST 内存 / 冷层 NVMe，本地缺失时再由远端源仓库补给）
        贡献3 — 扩缩容与显存分配协同控制：
                 扩容阶段渐进式加载（max_concurrent_loads=2），
                 优先保障 KV cache 与批推理工作集；
                 负载回落后保留 warm_pool_size 个高频工件，
                 确保后续负载到来时的快速响应。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: true  # 是否启用当前功能块
      min_hotness: 0.3  # 进入预加载集合的最小热度阈值
      gpu_warmup_hotness: 0.9       # 只把热度非常高的少量 LoRA 提前预热到 GPU，降低显存占用
      nvme_capacity_mb: 20480  # NVMe 层可用于 LoRA 的容量上限（MB）
      host_capacity_mb: 4096  # 主机内存层可用于 LoRA 的容量上限（MB）
      scale_up_preload_mb: 1024  # scale-up 预加载预算显式固定，避免落回 25%+clamp 启发式
      strategy: "greedy"  # 预加载选择策略
      dynamic_forwarding_enabled: true  # P2.6：持续、预测式、预算约束的动态工件前移默认开启
    resource_coordination:  # 扩缩容与资源协同调度配置块
      coordination_enabled: true  # 是否启用贡献 3 的资源协同机制
      effective_capacity_admission_enabled: true  # 是否开启有效容量准入（P2.5）
      max_concurrent_loads: 2  # 最多并发进行多少个 LoRA 加载任务
      warm_pool_size: 2            # 负载回落后默认保留的 warm pool 数量；在 24G 显存机器上取 2 更稳
      idle_timeout_s: 10  # 实例空闲多久后允许回收

  # ── 理论下限：纯 backbone（无 LoRA 开销）──────────────────────────
  - name: "backbone_only"  # 场景名称；会写入日志与结果文件
    baseline_type: "backbone_only"  # 场景实现路径标识
    description: >  # 对当前配置块或场景作用的自然语言说明
      纯 backbone 推理，不携带任何 LoRA 适配器。
      代表 TTFT 的理论下限（无 LoRA 加载开销）。
    preloading:  # 预加载与本地多层驻留配置块
      enabled: false  # 是否启用当前功能块

# =============================================================================
