model:  # 模型配置块，或当前选中的 model profile 名称
  # 兼容回退层：仅供未走 profile_selection / model_profiles 的旧路径读取。
  # 当前论文主线与日常实验入口请以 profile_selection + model_profiles + workload_profiles 为准。
  # 如需切模型，优先新增/修改 profile，而不是直接依赖本节注释。
