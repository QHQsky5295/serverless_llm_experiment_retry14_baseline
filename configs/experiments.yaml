  # RTX 3090 上 vLLM LoRA 若出现 "EngineCore died unexpectedly" 可尝试：
  # 1) 增大 /dev/shm：mount -o remount,size=1G /dev/shm 或 docker --shm-size=1g（需至少约 512MB）
  # 2) 保持 vLLM=0.10.2（见 pyproject.toml）
  # 3) 仍崩溃时可用 --backend transformers 切回稳定回退路径
  name: "/home/qhq/serverless_llm_experiment/models/Qwen--Qwen2.5-14B-Instruct"  # 本 profile 对应的模型路径或模型名
  backend: "vllm"  # 推理后端类型，如 vllm / transformers
  device_id: 0  # 默认主执行实例使用的 GPU 编号
  visible_device_ids: [0, 1, 2, 3]       # dedicated/auto 模式允许从这组 GPU 中选择新实例

  tensor_parallel_size: 2           # 兼容回退默认值；实际主线以所选 model profile 为准
  gpu_memory_utilization: 0.65      # 兼容回退默认值；主线请以选中 profile 的冻结参数为准
  max_model_len: 2048               # 兼容回退默认值
  max_loras: 8                      # 兼容回退默认值
  max_lora_rank: 16                 # 适配器最大 rank
  enable_lora: true  # 是否开启 LoRA 支持
  enforce_eager: true               # 禁用 CUDA Graph，避免兼容问题
  dtype: "float16"  # 模型权重与推理使用的数据类型
  max_num_seqs: 8                   # 兼容回退默认值
  max_num_batched_tokens: 4096      # 兼容回退默认值

  # transformers 后端：限制输出以减小 KV cache，避免 OOM/已杀死
