# =============================================================================
# FaaSLoRA 完整实验配置（发论文级）
# =============================================================================
# 用法：
#   python scripts/run_all_experiments.py --config configs/experiments.yaml
#   python scripts/run_all_experiments.py --config configs/experiments.yaml --quick
#   python scripts/run_all_experiments.py --config configs/experiments.yaml --backend transformers
#
# 数据集（与同类论文一致）：
#   Azure LLM Inference Trace (data/azure_llm/*.csv)
#     - 真实生产流量，时间跨度 1 小时，~28K 条记录
#     - 包含对话型（conv）和代码型（code）请求
#     - 字段：TIMESTAMP, ContextTokens, GeneratedTokens
#     - 来源：与 ServerlessLLM (NSDI'24) 使用相同数据集
#
#   ShareGPT（可选，运行 scripts/download_datasets.py 自动下载）
#     - 用于填充真实 prompt 文本；未下载时使用内嵌 200 条提示词
#     - 与 S-LoRA (SOSP'23) / Punica (MLSys'24) 使用相同数据集
# =============================================================================

experiment:  # 实验整体输出与统计方式总配置块
  name: "FaaSLoRA-Qwen2.5-3B"  # 实验名称，主要用于结果与文档标识
  description: >  # 对当前配置块或场景作用的自然语言说明
    对标 S-LoRA (SOSP'23) / ServerlessLLM (NSDI'24) / Punica (MLSys'24)
    的多 LoRA Serverless 推理完整评测，含三项贡献的消融实验。
  output_dir: "results"  # 实验结果输出目录
  results_file: "experiment_results.json"  # 默认结果文件名
  # 多轮实验：每场景运行 num_runs 次，报告均值 ± 标准差及 95% 置信区间（默认 1 即单次）
  num_runs: 1  # 每个场景重复运行次数
  confidence_level: 0.95  # 统计置信区间的置信水平

# ---------------------------------------------------------------------------
# Profile 选择器（优先用于切换模型 / 数据源 / 工作负载主线）
# ---------------------------------------------------------------------------
profile_selection:  # 当前默认激活的模型/数据集/工作负载 profile 选择器
  model: "qwen_7b_main_v2_publicmix"  # 当前 continuous_queue_v2 主线默认回到 Qwen 7B V2 publicmix
  dataset: "azure_sharegpt_rep500"  # 当前正式 bring-up 默认先跑 500 请求
  workload: "qwen_7b_auto500_main"  # 当前默认先跑 Qwen 7B 的 500 adapter 论文主线

# ---------------------------------------------------------------------------
# 模型 Profile（可覆盖 model + hardware）
# ---------------------------------------------------------------------------
model_profiles:  # 可复用的模型 profile 集合
  qwen_3b_main:  # Qwen 3B 单卡主线模型 profile 名称
    model:  # 模型配置块，或当前选中的 model profile 名称
      name: "/home/qhq/serverless_llm_experiment/models/Qwen--Qwen2.5-3B-Instruct"  # 本 profile 对应的模型路径或模型名
      backend: "vllm"  # 推理后端类型，如 vllm / transformers
      device_id: 0  # 默认主执行实例使用的 GPU 编号
      visible_device_ids: [0, 1, 2, 3]  # 允许当前实例或新实例使用的 GPU 列表
      tensor_parallel_size: 1  # 张量并行数；2 表示双卡切分模型
      gpu_memory_utilization: 0.65  # vLLM 允许占用的单卡显存比例上限
      max_model_len: 2048  # 模型允许处理的最大上下文长度
      max_loras: 8  # 单个 runtime 同时驻留的最大 LoRA 数量
      max_lora_rank: 16  # 支持的 LoRA 最大 rank
      enable_lora: true  # 是否开启 LoRA 支持
      enforce_eager: true  # 是否强制 eager 模式，避免部分 CUDA Graph 兼容问题
      dtype: "float16"  # 模型权重与推理使用的数据类型
      max_num_seqs: 8  # 单个 runtime 同时调度的最大序列数
      max_num_batched_tokens: 4096  # 单批次允许处理的最大 token 总数
      max_output_tokens_cap: 64  # 单次生成的最大输出 token 上限
      max_input_len: 256  # 单请求输入最大长度，超出会截断
      runtime_concurrency_cap: 8  # 单个 runtime 允许的并发处理上限
    hardware:  # 硬件容量与显存估计配置块
      model_weights_mb: 3200  # 基座模型权重占用的显存估计值（MB）
      kv_per_1k_tokens_mb: 1.0  # 每 1000 token 的 KV cache 显存估计（MB）

  qwen_7b_main:  # Qwen 7B 单卡 TP=1 主线模型 profile 名称
    model:  # 模型配置块，或当前选中的 model profile 名称
      name: "/home/qhq/serverless_llm_experiment/models/Qwen--Qwen2.5-7B-Instruct"  # 本 profile 对应的模型路径或模型名
      backend: "vllm"  # 推理后端类型，如 vllm / transformers
      device_id: 0  # 默认主执行实例使用的 GPU 编号
      visible_device_ids: [0, 1, 2, 3]  # 允许当前实例或新实例使用的 GPU 列表
      tensor_parallel_size: 1  # 张量并行数；Qwen 7B 主线按单卡 TP=1 + scale-out 推进
      gpu_memory_utilization: 0.85  # vLLM 允许占用的单卡显存比例上限
      max_model_len: 1024  # 模型允许处理的最大上下文长度
      max_loras: 2  # 单个 runtime 同时驻留的最大 LoRA 数量
      max_lora_rank: 16  # 支持的 LoRA 最大 rank
      enable_lora: true  # 是否开启 LoRA 支持
      enforce_eager: true  # 是否强制 eager 模式，避免部分 CUDA Graph 兼容问题
      dtype: "float16"  # 模型权重与推理使用的数据类型
      max_num_seqs: 4  # 单个 runtime 同时调度的最大序列数
      max_num_batched_tokens: 1024  # 单批次允许处理的最大 token 总数
      max_output_tokens_cap: 64  # 单次生成的最大输出 token 上限
      max_input_len: 256  # 单请求输入最大长度，超出会截断
      runtime_concurrency_cap: 4  # 单个 runtime 允许的并发处理上限
    hardware:  # 硬件容量与显存估计配置块
      model_weights_mb: 14336  # 基座模型权重占用的显存估计值（MB）
      kv_per_1k_tokens_mb: 2.0  # 每 1000 token 的 KV cache 显存估计（MB）
    storage:  # 工件冻结目录配置；同一 base model 的不同系统/不同实验应复用同一目录
      remote_dir: "artifacts/frozen/qwen_7b_a500_v1"  # Qwen 7B 论文正式对比的冻结 LoRA 源仓库

  qwen_7b_main_v2_publicmix:  # Qwen 7B 单卡 TP=1 主线模型 profile（V2 publicmix 冻结工件池）
    model:
      name: "/home/qhq/serverless_llm_experiment/models/Qwen--Qwen2.5-7B-Instruct"
      backend: "vllm"
      device_id: 0
      visible_device_ids: [0, 1, 2, 3]
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.70  # V2 publicmix 的异构 LoRA 更吃显存；给第二个单卡实例和热层装载预留稳定余量
      max_model_len: 1024
      max_loras: 6  # 恢复多 LoRA 主线表达力度：24G 单卡上先取 6，兼顾热 LoRA 预加载意义与 V2 publicmix 异构工件稳定性
      max_lora_rank: 32  # publicmix V2 中包含少量更高 rank 的公开 LoRA
      enable_lora: true
      enforce_eager: true
      dtype: "float16"
      max_num_seqs: 2  # 先把 runtime 内部调度并发降到 2，避免单实例高水位时 EngineCore 提前死亡
      max_num_batched_tokens: 1024
      max_output_tokens_cap: 64
      max_input_len: 256
      runtime_concurrency_cap: 2  # 系统层并发同步收紧，优先保证 Qwen 7B V2 scale-out 跑稳
      enable_chunked_prefill: false  # 关闭 chunked prefill，减少 V1 路径下的额外运行时变量
      enable_prefix_caching: false  # 关闭 prefix caching，降低异构 publicmix LoRA 与缓存路径交互的不确定性
      vllm_use_v1: false  # 强制退回更稳的 V0 路径，避免当前环境下 Qwen 7B V2 的 EngineCore 中途死亡
      vllm_attention_backend: "FLASH_ATTN"  # 注意力后端固定为 FlashAttention
      vllm_use_flashinfer_sampler: false  # 显式关闭 FlashInfer sampler，保证不同模型家族的运行时口径一致
    hardware:
      model_weights_mb: 14336
      kv_per_1k_tokens_mb: 2.0
    storage:
      remote_dir: "artifacts/frozen/qwen_7b_a500_v2_publicmix"  # Qwen 7B 论文正式 V2 publicmix 冻结 LoRA 源仓库

  qwen_7b_tp2_compare:  # Qwen 7B 双卡 TP=2 吞吐对照模型 profile 名称
