  input_token_cost_usd: 0.0000015
  output_token_cost_usd: 0.000002
  gpu_hour_cost_usd: 3.0

# =============================================================================
# 实验场景（消融 + SOTA 对比）
# =============================================================================
scenarios:

  # ── Baseline 1: Cold Start（最坏情况，现有 Serverless 平台默认行为）────────
  - name: "cold_start"
    baseline_type: "cold_start"
    description: >
      Baseline: 每次请求均从远端下载 LoRA，无任何缓存。
      对标现有无状态 Serverless 函数实例的行为。
    preloading:
      enabled: false

  # ── Baseline 2: S-LoRA (SOSP'23) ─────────────────────────────────────
  - name: "slora_style"
    baseline_type: "slora_style"
    description: >
      S-LoRA: LoRA 适配器驻留在 CPU pinned memory，按需通过 PCIe 加载到 GPU。
      LRU GPU 驱逐，无预加载。对标 S-LoRA (SOSP'23)。
    preloading:
      enabled: false
      lru_cache_size: 8

  # ── Baseline 3: ServerlessLLM (NSDI'24) ──────────────────────────────
  - name: "serverlessllm"
    baseline_type: "serverlessllm"
    description: >
      ServerlessLLM: NVMe 检查点存储，本地性感知路由，无预测性预加载。
      对标 ServerlessLLM (NSDI'24)。
    preloading:
      enabled: false
      lru_cache_size: 8

  # ── FaaSLoRA 贡献1：三层级联预加载（远端→硬盘→内存→GPU）────────────────
  - name: "faaslora_nvme"
    baseline_type: "faaslora_nvme"
    description: >
      FaaSLoRA 贡献1：最热→GPU、次热→内存、再次→硬盘；请求时从对应层加载，避免远程直连 GPU。
    preloading:
      enabled: true
      min_hotness: 0.4
      gpu_warmup_hotness: 0.6
      nvme_capacity_mb: 20480
      host_capacity_mb: 4096
      strategy: "greedy"

  # ── FaaSLoRA 贡献1+2（消融：无贡献3）───────────────────────────────
  - name: "faaslora_no_coord"
    baseline_type: "faaslora_no_coord"
    description: >
      FaaSLoRA 贡献1+2（消融实验）：命中感知预加载 + GPU 多层显存驻留，
      但无贡献3的扩缩容协同调度。用于量化贡献3的独立价值。
    preloading:
      enabled: true
      min_hotness: 0.3
      gpu_warmup_hotness: 0.6
      nvme_capacity_mb: 20480
      host_capacity_mb: 4096
      strategy: "greedy"
    resource_coordination:
      coordination_enabled: false

  # ── FaaSLoRA 完整系统（贡献1+2+3）──────────────────────────────────
  - name: "faaslora_full"
    baseline_type: "faaslora_full"
    description: >
      FaaSLoRA 完整系统：
        贡献1 — 命中感知工件预加载（scale-up 前提前加载高频 LoRA）
        贡献2 — GPU 显存三层本地驻留（热层 GPU 显存 / 温层 HOST 内存 / 冷层 NVMe，本地缺失时再由远端源仓库补给）
        贡献3 — 扩缩容与显存分配协同控制：
                 扩容阶段渐进式加载（max_concurrent_loads=2），
                 优先保障 KV cache 与批推理工作集；
                 负载回落后保留 warm_pool_size 个高频工件，
                 确保后续负载到来时的快速响应。
    preloading:
      enabled: true
      min_hotness: 0.3
      gpu_warmup_hotness: 0.9       # 仅预热最热 1~2 个 LoRA，减轻显存
      nvme_capacity_mb: 20480
      host_capacity_mb: 4096
      strategy: "greedy"
    resource_coordination:
      coordination_enabled: true
      effective_capacity_admission_enabled: true
      max_concurrent_loads: 2
      warm_pool_size: 2            # 24G 显存下减小
      idle_timeout_s: 10

  # ── 理论下限：纯 backbone（无 LoRA 开销）──────────────────────────
  - name: "backbone_only"
    baseline_type: "backbone_only"
    description: >
      纯 backbone 推理，不携带任何 LoRA 适配器。
      代表 TTFT 的理论下限（无 LoRA 加载开销）。
    preloading:
      enabled: false

