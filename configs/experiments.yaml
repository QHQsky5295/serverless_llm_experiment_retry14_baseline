# ---------------------------------------------------------------------------
# 存储配置
# ---------------------------------------------------------------------------
storage:  # 远端/本地缓存目录与带宽模拟配置块
  remote_dir: "artifacts/remote"  # 兼容回退目录；正式论文对比请通过 model profile 的 storage.remote_dir 使用模型专属冻结目录
  nvme_cache_dir: "artifacts/nvme_cache"  # 本地 NVMe 缓存目录
  # 贡献1 内存层：热点 LoRA 从硬盘预加载到内存，请求时从内存加载到 GPU，减少硬盘→GPU 延迟
  host_cache_dir: "artifacts/host_cache"  # 主机内存缓存目录

  # 带宽模拟（模拟远端对象存储 → 本地 NVMe 的网络传输，代码中按 MB/s 换算延迟）
  # 同 region（如 S3/Blob 与实例同区）：约 100–500 MB/s（≈1–4 Gbps），取 250 更贴近典型云环境
  # 跨 region/受限：可设为 50–100；0 = 不限速（仅测本地拷贝）
  bandwidth_mbps: 250  # 远端到本地的模拟带宽（MB/s）

# ---------------------------------------------------------------------------
# 数据源配置（由 YAML 控制数据集选择）
# ---------------------------------------------------------------------------
datasets:  # 请求到达、token 长度和 prompt 文本的数据来源配置块
  arrival_source: "azure_llm"      # 到达时间来源：azure_llm 或 synthetic_poisson
  token_source: "azure_llm"        # token 长度来源：azure_llm 或 fixed_default
  prompt_source: "sharegpt_auto"   # prompt 来源：sharegpt_auto 或 embedded
  azure_max_records:               # 读取多少条 Azure LLM 记录；留空表示全部
  sharegpt_max_records: 5000       # 读取多少条 ShareGPT 记录；embedded 模式下忽略

# ---------------------------------------------------------------------------
# 工作负载（使用真实 Azure LLM 推理追踪）
# ---------------------------------------------------------------------------
workload:  # 工作负载配置块，或当前选中的 workload profile 名称
  # 兼容回退层：active mainline 的请求数/并发/热点窗口通常由 dataset/workload profile 覆盖。
  workload_type: "mixed"  # 工作负载类型，如 mixed / conv / code

  # Azure LLM trace 时间缩放
  time_scale_factor: 1.0  # official continuous_queue_v2 主线默认回放真实 Azure trace 时序
  sampling_strategy: "representative"   # 完整版默认使用代表性抽样，近似保持到达/长度/burst 分布

  # 请求数量：本次实验生成多少条请求
  # 当前默认 1000；Qwen2.5-14B 主线可直接改成 4000
  total_requests: 1000  # 正式实验总请求数

  # LoRA 选择分布（Zipf，与 S-LoRA 论文一致）
  lora_request_ratio: 0.85  # 有多少比例的请求会带 LoRA
  zipf_exponent: 1.0  # Zipf 热度分布指数，越大表示越长尾
  active_adapter_cap: 16          # 当前活跃热点集合规模；大于此数的 adapter 通过热集轮换进入活跃窗
  hotset_rotation_requests: 120   # 每处理 N 个请求滚动热点窗

  # 当前默认主线并发：与 runtime_concurrency_cap 对齐
  concurrency: 8  # 请求并发度
  quick_total_requests: 30  # quick 模式下的总请求数
  quick_concurrency: 1  # quick 模式下的并发度
  live_progress: true  # 是否实时打印实验进度
  live_progress_interval_s: 8.0  # 按时间间隔打印进度的秒数
  live_progress_every_requests: 25  # 每处理多少个请求打印一次进度
  show_instance_panel: true  # 是否显示实例状态面板
  max_tokens: 128  # 单次生成默认最大 token 数
  temperature: 0.7  # 采样温度
  top_p: 0.9  # top-p 采样阈值

  # E1: 多周期评估（scale-up → 请求 → scale-down → 再 scale-up）
  multi_cycle_phases: 1            # 1=单周期（默认），2+ 则分 phase 并在 phase 间 scale_down
  idle_between_phases_s: 2.0        # 每 phase 结束后 idle 秒数（可选）

# ---------------------------------------------------------------------------
# 论文矩阵 preset（正式入口，避免只靠环境变量驱动）
# ---------------------------------------------------------------------------
