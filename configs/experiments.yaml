# =============================================================================
# FaaSLoRA 完整实验配置（发论文级）
# =============================================================================
# 用法：
#   python scripts/run_all_experiments.py --config configs/experiments.yaml
#   python scripts/run_all_experiments.py --config configs/experiments.yaml --quick
#   python scripts/run_all_experiments.py --config configs/experiments.yaml --backend transformers
#
# 数据集（与同类论文一致）：
#   Azure LLM Inference Trace (data/azure_llm/*.csv)
#     - 真实生产流量，时间跨度 1 小时，~28K 条记录
#     - 包含对话型（conv）和代码型（code）请求
#     - 字段：TIMESTAMP, ContextTokens, GeneratedTokens
#     - 来源：与 ServerlessLLM (NSDI'24) 使用相同数据集
#
#   ShareGPT（可选，运行 scripts/download_datasets.py 自动下载）
#     - 用于填充真实 prompt 文本；未下载时使用内嵌 200 条提示词
#     - 与 S-LoRA (SOSP'23) / Punica (MLSys'24) 使用相同数据集
# =============================================================================

experiment:
  name: "FaaSLoRA-Qwen2.5-3B"
  description: >
    对标 S-LoRA (SOSP'23) / ServerlessLLM (NSDI'24) / Punica (MLSys'24)
    的多 LoRA Serverless 推理完整评测，含三项贡献的消融实验。
  output_dir: "results"
  results_file: "experiment_results.json"
  # 多轮实验：每场景运行 num_runs 次，报告均值 ± 标准差及 95% 置信区间（默认 1 即单次）
  num_runs: 1
  confidence_level: 0.95

# ---------------------------------------------------------------------------
# 基座模型
# ---------------------------------------------------------------------------
model:
  # 当前默认主线复现实验路径：Qwen2.5-3B-Instruct（auto + 500 LoRA + representative 1000 requests）
  # RTX 3090 上 vLLM LoRA 若出现 "EngineCore died unexpectedly" 可尝试：
  # 1) 增大 /dev/shm：mount -o remount,size=1G /dev/shm 或 docker --shm-size=1g（需至少约 512MB）
  # 2) 降级 vLLM：pip install vllm==0.10.2（见 pyproject.toml；0.10.0 需 Python<3.13）
  # 3) 仍崩溃时可用 --backend transformers 切回稳定回退路径
  name: "/home/qhq/serverless_llm_experiment/models/Qwen--Qwen2.5-3B-Instruct"
  backend: "vllm"
  device_id: 0
  visible_device_ids: [0, 1]       # dedicated/auto 模式允许从这组 GPU 中选择新实例

  tensor_parallel_size: 1           # 单卡 3090
  gpu_memory_utilization: 0.65      # 当前主线稳定使用 0.65；后续扩到更大 backbone 再单独调
  max_model_len: 2048               # 当前主线验证通过值
  max_loras: 8                      # 当前 auto500 主线验证通过值
  max_lora_rank: 16                 # 适配器最大 rank（code_lora=16）
  enable_lora: true
  enforce_eager: true               # 禁用 CUDA Graph，避免兼容问题
  dtype: "float16"
  max_num_seqs: 8                   # 当前 auto500 主线验证通过值
  max_num_batched_tokens: 4096      # 当前 auto500 主线验证通过值

  # transformers 后端：限制输出以减小 KV cache，避免 OOM/已杀死
  max_output_tokens_cap: 64
  max_input_len: 256              # 输入截断长度，与 Azure trace 分布一致
  runtime_concurrency_cap: 8      # 当前 auto500 主线验证通过值

  # ── 备选：Qwen2.5-7B-Instruct（需要更保守的显存设置）───────────────
  # 取消以下注释并注释掉上面 3B 配置即可切换：
  # name: "/home/qhq/serverless_llm_experiment/models/Qwen--Qwen2.5-7B-Instruct"
  # backend: "vllm"
  # tensor_parallel_size: 1
  # gpu_memory_utilization: 0.85
  # max_model_len: 1024
  # max_loras: 2
  # max_lora_rank: 16
  # enable_lora: true
  # enforce_eager: true
  # dtype: "float16"
  # max_num_seqs: 4
  # max_num_batched_tokens: 1024

backend_profiles:
  transformers:
    model:
      backend: "transformers"
      gpu_memory_utilization: 0.65
      max_model_len: 1024
      max_loras: 2
      max_num_seqs: 2
      max_num_batched_tokens: 512
      max_output_tokens_cap: 64
      max_input_len: 256
      runtime_concurrency_cap: 1
    resource_coordination:
      max_instances: 1
      instance_mode: "shared"

# ---------------------------------------------------------------------------
# 硬件配置（用于 SOTA baseline 延迟模型校准）
# ---------------------------------------------------------------------------
hardware:
  gpu_budget_mb: 24576              # 单卡 3090 24 GB
  model_weights_mb: 3200            # 3B fp16 ≈ 3.2 GB（切7B时改为7424）

  # KV cache 每 1K tokens 占用（MB）：Qwen2.5-3B ≈ 1.0 MB/1K tokens
  kv_per_1k_tokens_mb: 1.0

  # S-LoRA baseline：CPU pinned memory → GPU (PCIe 4.0 x16)
  pcie_bw_mbps: 16000

  # ServerlessLLM baseline：NVMe SSD → GPU
  nvme_bw_mbps: 3000

  # GPU 显存分配与同步开销（ms）
  gpu_load_overhead_ms: 50

# ---------------------------------------------------------------------------
# 资源协同调度配置（贡献3）
# ---------------------------------------------------------------------------
resource_coordination:
  min_instances: 1                  # 实例池下限（scale-down 至少保留）
  max_instances: 2                  # 当前主线允许扩到第二个物理 runtime
  instance_mode: "auto"             # 当前主线模式；shared/dedicated 接口保留但不作为默认路径
  instance_model_overrides: {}      # dedicated/auto 模式下新实例的 model_cfg 覆盖
  effective_capacity_admission_enabled: true  # 当前仓库默认主线：开启 P2.5 风格有效容量准入
  lora_load_reserve_ratio: 0.15     # 预留显存比例用于加载队列
  max_concurrent_loads: 2           # 渐进式启动：最多2个并发 LoRA 加载
  idle_timeout_s: 10                # 低负载持续 N 秒后触发 scale-down
  warm_pool_size: 2                 # 24G 显存下减小以避免 OOM
  # A1: 请求流内扩缩决策
  scale_up_threshold_rps: 3.0       # 固定模式下的 RPS 阈值；动态模式下忽略
  scale_cooldown_s: 30.0           # 两次 scale-up 之间最小间隔（秒）
  scale_decision_interval: 25      # 每处理 N 个请求评估一次是否扩容
  routing_policy: "adapter_affinity"
  arrival_window_s: 5.0            # 估计 arrival RPS 的滑动窗口（秒）

  # 动态扩缩容阈值（论文：workload-adaptive）
  dynamic_scaling: true             # 默认开启：用 EWMA 基线 + 相对阈值替代固定 RPS 阈值
  baseline_rps_ewma_beta: 0.25      # EWMA 更新系数 β
  scale_up_alpha: 0.3               # scale-up 触发线 = max(T_min, baseline_rps * (1 + α))
  scale_up_t_min: 1.0               # scale-up 绝对下限 (RPS)
  scale_down_beta: 0.4              # scale-down 触发线 = baseline_rps * β_down
  scale_down_duration_s: 45         # 持续低负载 ≥ 此秒数才执行 scale-down
  dynamic_warm_pool: true           # warm pool 大小随近期活跃 LoRA 数自适应
  warm_pool_gamma: 0.2              # warm_pool_size = clip(round(active_loras_ewma*(1+γ)), min, max)
  warm_pool_min: 2
  warm_pool_max: 8

# ---------------------------------------------------------------------------
# LoRA 适配器
# ---------------------------------------------------------------------------
lora_adapters:
  generate_synthetic: true
  manifest_path: "configs/generated/lora_manifest_1000.json"
  auto_create_manifest: true
  preserve_legacy_names: true
  selected_num_adapters: 500
  quick_num_adapters: 100
  full_num_adapters: 500
  # 说明：
  #   1) 运行主实验时，将从 manifest 中选择前 N 个 adapter
  #   2) quick 模式默认 100；完整版默认 500
  #   3) 若 manifest 不存在，run_all_experiments.py 会自动生成元数据文件
  #   4) 真正的 adapter 目录可通过 scripts/generate_lora_adapters.py 批量生成
  scale_presets:
    "100":
      workload:
        zipf_exponent: 1.10
        lora_request_ratio: 0.95
        active_adapter_cap: 16
        hotset_rotation_requests: 120
      model:
        max_loras: 4
        max_num_seqs: 2
        max_num_batched_tokens: 512
        runtime_concurrency_cap: 2
      resource_coordination:
        warm_pool_size: 4
    "200":
      workload:
        zipf_exponent: 1.15
        lora_request_ratio: 0.95
        active_adapter_cap: 24
        hotset_rotation_requests: 120
      model:
        max_loras: 4
        max_num_seqs: 2
        max_num_batched_tokens: 768
        runtime_concurrency_cap: 2
      resource_coordination:
        warm_pool_size: 4
    "300":
