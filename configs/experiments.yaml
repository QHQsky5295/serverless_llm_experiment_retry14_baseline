# ---------------------------------------------------------------------------
# 存储配置
# ---------------------------------------------------------------------------
storage:
  remote_dir: "artifacts/remote"
  nvme_cache_dir: "artifacts/nvme_cache"
  # 贡献1 内存层：热点 LoRA 从硬盘预加载到内存，请求时从内存加载到 GPU，减少硬盘→GPU 延迟
  host_cache_dir: "artifacts/host_cache"

  # 带宽模拟（模拟远端对象存储 → 本地 NVMe 的网络传输，代码中按 MB/s 换算延迟）
  # 同 region（如 S3/Blob 与实例同区）：约 100–500 MB/s（≈1–4 Gbps），取 250 更贴近典型云环境
  # 跨 region/受限：可设为 50–100；0 = 不限速（仅测本地拷贝）
  bandwidth_mbps: 250

# ---------------------------------------------------------------------------
# 工作负载（使用真实 Azure LLM 推理追踪）
# ---------------------------------------------------------------------------
workload:
  workload_type: "mixed"

  # Azure trace 时间缩放
  time_scale_factor: 0.02
  sampling_strategy: "representative"   # 完整版默认使用代表性抽样，近似保持到达/长度/burst 分布

  # 请求数量：从 28K 条 Azure trace 中采样多少条做本次实验
  # 当前完整版默认 1000，作为代表性工作负载；28185 用于最终 full-trace 验证
  total_requests: 1000

  # LoRA 选择分布（Zipf，与 S-LoRA 论文一致）
  lora_request_ratio: 0.85
  zipf_exponent: 1.0
  active_adapter_cap: 16          # 当前活跃热点集合规模；大于此数的 adapter 通过热集轮换进入活跃窗
  hotset_rotation_requests: 120   # 每处理 N 个请求滚动热点窗

  # 当前默认主线并发：与 runtime_concurrency_cap 对齐
  concurrency: 8
  quick_total_requests: 30
  quick_concurrency: 1
  live_progress: true
  live_progress_interval_s: 8.0
  live_progress_every_requests: 25
  show_instance_panel: true
  max_tokens: 128
  temperature: 0.7
  top_p: 0.9

  # E1: 多周期评估（scale-up → 请求 → scale-down → 再 scale-up）
  multi_cycle_phases: 1            # 1=单周期（默认），2+ 则分 phase 并在 phase 间 scale_down
  idle_between_phases_s: 2.0        # 每 phase 结束后 idle 秒数（可选）

